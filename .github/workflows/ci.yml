name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install scikit-learn numpy pytest
      - run: python -c "from analysis.clustering import EmbeddingClusterer; import numpy as np; e=np.random.default_rng(0).standard_normal((30,16)).astype('float32'); r=EmbeddingClusterer().kmeans(e,k=3); assert r.n_clusters==3; print('clustering OK')"
      - run: python -c "from search.semantic_search import cosine_search; import numpy as np; rng=np.random.default_rng(0); q=rng.standard_normal(16).astype('float32'); C=rng.standard_normal((20,16)).astype('float32'); r=cosine_search(q,C,[str(i) for i in range(20)],5); assert len(r)==5; print('search OK')"
      - run: python explore.py --task cluster
